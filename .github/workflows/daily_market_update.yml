name: Daily Market Data Update & Deploy

on:
  schedule:
    # 毎朝6:00 (JST) = 前日21:00 (UTC) に実行
    - cron: '0 21 * * *'
  workflow_dispatch: # GitHubの画面から手動実行も可能にする

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas pytz
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Node Dependencies (web-next)
        working-directory: ./web-next
        run: npm ci
        
      - name: Fetch Market Data and Deploy via FTP
        run: python deploy_kabu.py
